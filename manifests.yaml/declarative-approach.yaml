apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: 
  name: voting-app
  namespace: argocd
spec:
  project: vote-app2027

  source:
    repoURL: https://github.com/Jagdeep786-ctrl/k8s-kind-voting-app.git
    targetRevision: main
    path: manifests.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true